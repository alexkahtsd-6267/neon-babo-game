<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neon Babo Defaults</title>

  <style>
    :root {
      --bg:#080b18;
      --panel:#171b2a;
      --panel2:#202536;
      --text:#eef2ff;
      --muted:#b9c2e6;
      --line:rgba(255,255,255,.13);
      --accent:#8aa8ff;
      --good:#5cffc1;
      --bad:#ff5c7c;
    }

    * {
      box-sizing:border-box;
    }

    body {
      margin:0;
      padding:34px;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    h1 {
      margin:0 0 12px;
      font-size:36px;
      letter-spacing:.4px;
    }

    p {
      color:var(--muted);
      font-size:18px;
      margin:0 0 28px;
    }

    .toolbar {
      display:flex;
      gap:14px;
      align-items:center;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:22px;
      margin-bottom:28px;
      flex-wrap:wrap;
    }

    button {
      background:#2b334b;
      color:var(--text);
      border:1px solid rgba(255,255,255,.14);
      padding:14px 20px;
      border-radius:14px;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
    }

    button:hover {
      filter:brightness(1.12);
    }

    .primary {
      background:#344263;
    }

    input, select {
      background:#0d101c;
      color:var(--text);
      border:1px solid var(--line);
      border-radius:14px;
      padding:13px 16px;
      font-weight:800;
      font-size:16px;
      min-width:260px;
    }

    select {
      cursor:pointer;
    }

    input[type="number"] {
      min-width:180px;
    }

    input[type="checkbox"] {
      min-width:auto;
      width:24px;
      height:24px;
    }

    .status {
      font-weight:1000;
      color:var(--good);
      margin-left:4px;
    }

    .status.error {
      color:var(--bad);
    }

    .section {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      margin:18px 0;
      overflow:hidden;
    }

    .section-title {
      background:var(--panel2);
      padding:20px;
      font-size:22px;
      font-weight:1000;
      cursor:pointer;
      user-select:none;
    }

    .section-body {
      padding:20px;
    }

    .field {
      display:grid;
      grid-template-columns: 1fr auto;
      gap:20px;
      align-items:center;
      padding:16px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .field:last-child {
      border-bottom:none;
    }

    .field-name {
      font-size:20px;
      font-weight:1000;
      color:#cbd6ff;
    }

    .field-type {
      margin-top:4px;
      font-size:14px;
      color:#b8c3ee;
      font-weight:500;
    }

    .nested {
      margin-left:0;
    }

    @media (max-width: 760px) {
      body {
        padding:18px;
      }

      .field {
        grid-template-columns:1fr;
      }

      input, select {
        width:100%;
        min-width:0;
      }
    }
  </style>
</head>

<body>
  <h1>Neon Babo Defaults</h1>
  <p>Edit the server-side defaults used by new matches. Existing matches may not fully reset until a new match starts.</p>

  <div class="toolbar">
    <button id="reloadBtn">Reload</button>
    <button id="saveBtn" class="primary">Save Defaults</button>
    <input id="adminKey" placeholder="Admin key, if enabled" />
    <span id="status" class="status">Loading...</span>
  </div>

  <div id="root"></div>

  <script>
    const rootEl = document.getElementById("root");
    const statusEl = document.getElementById("status");
    const reloadBtn = document.getElementById("reloadBtn");
    const saveBtn = document.getElementById("saveBtn");
    const adminKeyEl = document.getElementById("adminKey");

    let defaultsData = {};

    adminKeyEl.value = localStorage.getItem("defaultsAdminKey") || "";

    adminKeyEl.addEventListener("input", () => {
      localStorage.setItem("defaultsAdminKey", adminKeyEl.value);
    });

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("error", !!isError);
    }

    function isPlainObject(value) {
      return (
        value &&
        typeof value === "object" &&
        !Array.isArray(value)
      );
    }

    function getType(value) {
      if (Array.isArray(value)) return "array";
      if (value === null) return "null";
      return typeof value;
    }

    function pathToString(path) {
      return path.join(".");
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getFriendlyLabel(pathString) {
      const labels = {
        "game.mode": "Game Mode",
        "singleplayer.difficulty": "Singleplayer Difficulty",

        "bots.aggressionLevel.flagPursuit": "Aggression Level: Flag pursuit",
        "bots.aggressionLevel.flagDefense": "Aggression Level: Flag defense",
        "bots.aggressionLevel.baseDefense": "Aggression Level: Base defense",
        "bots.aggressionLevel.basePursuit": "Aggression Level: Base pursuit",
        "bots.aggressionLevel.recapturingOwnFlag": "Aggression Level: Recapturing own flag",
        "bots.aggressionLevel.recapturingEnemyFlag": "Aggression Level: Recapturing enemy flag",
      };

      return labels[pathString] || pathString;
    }

    function getNumberBounds(pathString) {
      if (pathString.startsWith("bots.aggressionLevel.")) {
        return {
          min: 0,
          max: 10,
          step: 1,
          label: "number, 0–10",
        };
      }

      return null;
    }

    function getDropdownOptions(pathString) {
      if (pathString === "game.mode") {
        return [
          { value: "multiplayer", label: "Multiplayer" },
          { value: "singleplayer", label: "Singleplayer" },
          { value: "training", label: "Training" },
        ];
      }

      if (pathString === "singleplayer.difficulty") {
        return [
          { value: "easy", label: "1. Easy" },
          { value: "medium", label: "2. Medium" },
          { value: "hard", label: "3. Hard" },
          { value: "extreme", label: "4. Extremely hard" },
          { value: "machine", label: "5. Machine level hard" },
        ];
      }

      return null;
    }

    function normalizeDropdownValue(pathString, value) {
      const raw = String(value || "").trim().toLowerCase().replace(/\s+/g, "");

      if (pathString === "game.mode") {
        if (raw === "singleplayer" || raw === "single") return "singleplayer";
        if (raw === "training" || raw === "train") return "training";
        return "multiplayer";
      }

      if (pathString === "singleplayer.difficulty") {
        if (raw === "1" || raw === "easy") return "easy";
        if (raw === "2" || raw === "medium") return "medium";
        if (raw === "3" || raw === "hard") return "hard";
        if (raw === "4" || raw === "extreme" || raw === "extremelyhard") return "extreme";
        if (raw === "5" || raw === "machine" || raw === "machinelevelhard") return "machine";
        return "easy";
      }

      return value;
    }

    function makeInput(value, path) {
      const pathString = pathToString(path);
      const dropdownOptions = getDropdownOptions(pathString);

      let input;

      if (dropdownOptions) {
        input = document.createElement("select");

        for (const optionData of dropdownOptions) {
          const option = document.createElement("option");
          option.value = optionData.value;
          option.textContent = optionData.label;
          input.appendChild(option);
        }

        input.value = normalizeDropdownValue(pathString, value);
        return input;
      }

      if (typeof value === "boolean") {
        input = document.createElement("input");
        input.type = "checkbox";
        input.checked = value;
        return input;
      }

      if (typeof value === "number") {
        input = document.createElement("input");
        input.type = "number";

        const bounds = getNumberBounds(pathString);

        if (bounds) {
          input.min = String(bounds.min);
          input.max = String(bounds.max);
          input.step = String(bounds.step);
        } else {
          input.step = "any";
        }

        input.value = value;
        return input;
      }

      input = document.createElement("input");
      input.type = "text";
      input.value = value ?? "";

      return input;
    }

    function readInputValue(input, originalValue, path) {
      const pathString = pathToString(path);
      const dropdownOptions = getDropdownOptions(pathString);

      if (dropdownOptions) {
        return input.value;
      }

      if (typeof originalValue === "boolean") {
        return !!input.checked;
      }

      if (typeof originalValue === "number") {
        const n = Number(input.value);

        if (!Number.isFinite(n)) {
          return originalValue;
        }

        const bounds = getNumberBounds(pathString);

        if (bounds) {
          return clamp(Math.round(n), bounds.min, bounds.max);
        }

        return n;
      }

      return input.value;
    }

    function setAtPath(obj, path, value) {
      let cur = obj;

      for (let i = 0; i < path.length - 1; i++) {
        const key = path[i];

        if (!isPlainObject(cur[key])) {
          cur[key] = {};
        }

        cur = cur[key];
      }

      cur[path[path.length - 1]] = value;
    }

    function renderObject(obj, container, path = []) {
      for (const [key, value] of Object.entries(obj)) {
        const nextPath = [...path, key];
        const pathString = pathToString(nextPath);

        if (isPlainObject(value)) {
          const section = document.createElement("div");
          section.className = "section";

          const title = document.createElement("div");
          title.className = "section-title";
          title.textContent = "▼ " + getFriendlyLabel(pathString);

          const body = document.createElement("div");
          body.className = "section-body nested";

          title.addEventListener("click", () => {
            const hidden = body.style.display === "none";
            body.style.display = hidden ? "" : "none";
            title.textContent = (hidden ? "▼ " : "▶ ") + getFriendlyLabel(pathString);
          });

          renderObject(value, body, nextPath);

          section.appendChild(title);
          section.appendChild(body);
          container.appendChild(section);
          continue;
        }

        const field = document.createElement("div");
        field.className = "field";

        const label = document.createElement("div");

        const name = document.createElement("div");
        name.className = "field-name";
        name.textContent = getFriendlyLabel(pathString);

        const type = document.createElement("div");
        type.className = "field-type";

        const bounds = getNumberBounds(pathString);

        type.textContent = getDropdownOptions(pathString)
          ? "dropdown"
          : bounds
            ? bounds.label
            : getType(value);

        label.appendChild(name);
        label.appendChild(type);

        const input = makeInput(value, nextPath);

        input.addEventListener("change", () => {
          const nextValue = readInputValue(input, value, nextPath);

          if (typeof value === "number") {
            input.value = String(nextValue);
          }

          setAtPath(defaultsData, nextPath, nextValue);
          setStatus("Unsaved changes");
        });

        input.addEventListener("input", () => {
          setAtPath(defaultsData, nextPath, readInputValue(input, value, nextPath));
          setStatus("Unsaved changes");
        });

        field.appendChild(label);
        field.appendChild(input);
        container.appendChild(field);
      }
    }

    async function loadDefaults() {
      try {
        setStatus("Loading...");

        const res = await fetch("/api/defaults", {
          cache: "no-store",
        });

        if (!res.ok) {
          throw new Error("Could not load defaults");
        }

        defaultsData = await res.json();

        rootEl.innerHTML = "";
        renderObject(defaultsData, rootEl);

        setStatus("Loaded");
      } catch (err) {
        console.error(err);
        setStatus(err.message || "Load failed", true);
      }
    }

    async function saveDefaults() {
      try {
        setStatus("Saving...");

        const headers = {
          "Content-Type": "application/json",
        };

        if (adminKeyEl.value.trim()) {
          headers["x-admin-key"] = adminKeyEl.value.trim();
        }

        const res = await fetch("/api/defaults", {
          method: "POST",
          headers,
          body: JSON.stringify(defaultsData),
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || "Save failed");
        }

        defaultsData = await res.json();

        rootEl.innerHTML = "";
        renderObject(defaultsData, rootEl);

        setStatus("Saved");
      } catch (err) {
        console.error(err);
        setStatus(err.message || "Save failed", true);
      }
    }

    reloadBtn.addEventListener("click", loadDefaults);
    saveBtn.addEventListener("click", saveDefaults);

    loadDefaults();
  </script>
</body>
</html>
