<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neon Babo Defaults</title>

  <style>
    :root {
      --bg: #070915;
      --panel: rgba(255,255,255,.07);
      --line: rgba(255,255,255,.14);
      --text: #e9ecff;
      --muted: #b7bddb;
      --accent: #7aa7ff;
      --bad: #ff5c7c;
      --good: #5cffc1;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(900px 700px at 20% 10%, rgba(122,167,255,.18), transparent 55%),
        radial-gradient(800px 700px at 80% 20%, rgba(176,122,255,.14), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      padding: 24px;
      box-sizing: border-box;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 30px;
    }

    p {
      color: var(--muted);
      margin-top: 0;
      line-height: 1.5;
    }

    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin: 18px 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(12px);
    }

    button {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 14px;
      background: linear-gradient(180deg, rgba(122,167,255,.22), rgba(122,167,255,.07));
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      background: rgba(255,255,255,.06);
      color: var(--muted);
    }

    input {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(0,0,0,.22);
      color: var(--text);
      font-weight: 700;
    }

    input[type="number"] {
      width: 140px;
    }

    input[type="text"], input[type="password"] {
      min-width: 220px;
    }

    .status {
      font-weight: 800;
      color: var(--muted);
    }

    details {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.045);
      margin: 10px 0;
      overflow: hidden;
    }

    summary {
      cursor: pointer;
      padding: 13px 14px;
      font-weight: 900;
      background: rgba(255,255,255,.045);
    }

    .inside {
      padding: 12px;
    }

    .field {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 220px;
      gap: 14px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .field:last-child {
      border-bottom: 0;
    }

    .key {
      color: var(--muted);
      font-weight: 800;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .danger {
      color: var(--bad);
    }

    .success {
      color: var(--good);
    }

    @media (max-width: 700px) {
      .field {
        grid-template-columns: 1fr;
      }

      input[type="number"], input[type="text"], input[type="password"] {
        width: 100%;
        box-sizing: border-box;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Neon Babo Defaults</h1>
    <p>
      Edit the server-side defaults used by new matches.
      Existing matches may not fully reset until a new match starts.
    </p>

    <div class="topbar">
      <button id="reloadBtn" class="secondary">Reload</button>
      <button id="saveBtn">Save Defaults</button>
      <input id="adminKey" type="password" placeholder="Admin key, if enabled" />
      <span id="status" class="status">Loading...</span>
    </div>

    <div id="form"></div>
  </div>

  <script>
    let currentDefaults = {};

    const form = document.getElementById("form");
    const statusEl = document.getElementById("status");
    const adminKeyInput = document.getElementById("adminKey");

    adminKeyInput.value = localStorage.getItem("defaultsAdminKey") || "";

    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = "status " + type;
    }

    function deepClone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function setByPath(obj, path, value) {
      let ref = obj;

      for (let i = 0; i < path.length - 1; i++) {
        ref = ref[path[i]];
      }

      ref[path[path.length - 1]] = value;
    }

    function makeField(path, value) {
      const row = document.createElement("div");
      row.className = "field";

      const left = document.createElement("div");

      const key = document.createElement("div");
      key.className = "key";
      key.textContent = path.join(".");

      const hint = document.createElement("div");
      hint.className = "hint";
      hint.textContent = typeof value;

      left.appendChild(key);
      left.appendChild(hint);

      let input;

      if (typeof value === "boolean") {
        input = document.createElement("input");
        input.type = "checkbox";
        input.checked = value;
      } else if (typeof value === "number") {
        input = document.createElement("input");
        input.type = "number";
        input.step = "any";
        input.value = value;
      } else {
        input = document.createElement("input");
        input.type = "text";
        input.value = value;
      }

      input.dataset.path = JSON.stringify(path);
      input.dataset.type = typeof value;

      row.appendChild(left);
      row.appendChild(input);

      return row;
    }

    function renderNode(value, path = []) {
      const container = document.createElement("div");

      if (value && typeof value === "object") {
        for (const [key, child] of Object.entries(value)) {
          const childPath = path.concat(key);

          if (child && typeof child === "object") {
            const details = document.createElement("details");
            details.open = path.length < 1;

            const summary = document.createElement("summary");
            summary.textContent = childPath.join(".");

            const inside = document.createElement("div");
            inside.className = "inside";
            inside.appendChild(renderNode(child, childPath));

            details.appendChild(summary);
            details.appendChild(inside);
            container.appendChild(details);
          } else {
            container.appendChild(makeField(childPath, child));
          }
        }
      }

      return container;
    }

    function readFormValues() {
      const updated = deepClone(currentDefaults);
      const inputs = form.querySelectorAll("[data-path]");

      for (const input of inputs) {
        const path = JSON.parse(input.dataset.path);
        const type = input.dataset.type;

        let value;

        if (type === "boolean") {
          value = input.checked;
        } else if (type === "number") {
          value = Number(input.value);
        } else {
          value = input.value;
        }

        setByPath(updated, path, value);
      }

      return updated;
    }

    async function api(path, options = {}) {
      const headers = options.headers || {};
      const adminKey = adminKeyInput.value.trim();

      if (adminKey) {
        headers["x-admin-key"] = adminKey;
      }

      if (options.body) {
        headers["Content-Type"] = "application/json";
      }

      const res = await fetch(path, {
        ...options,
        headers,
        cache: "no-store",
      });

      if (!res.ok) {
        throw new Error(await res.text());
      }

      return res.json();
    }

    async function loadDefaults() {
      try {
        setStatus("Loading...");
        currentDefaults = await api("/api/defaults");
        form.innerHTML = "";
        form.appendChild(renderNode(currentDefaults));
        setStatus("Loaded", "success");
      } catch (err) {
        console.error(err);
        setStatus("Load failed", "danger");
      }
    }

    async function saveDefaults() {
      try {
        setStatus("Saving...");

        localStorage.setItem("defaultsAdminKey", adminKeyInput.value.trim());

        const updated = readFormValues();

        currentDefaults = await api("/api/defaults", {
          method: "POST",
          body: JSON.stringify(updated),
        });

        form.innerHTML = "";
        form.appendChild(renderNode(currentDefaults));

        setStatus("Saved", "success");
      } catch (err) {
        console.error(err);
        setStatus("Save failed: " + err.message, "danger");
      }
    }

    document.getElementById("reloadBtn").onclick = loadDefaults;
    document.getElementById("saveBtn").onclick = saveDefaults;

    loadDefaults();
  </script>
</body>
</html>
